[tool.pytest.ini_options]
testpaths      = ["tests"]
python_files   = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
markers = [
    "integration: marks tests as integration tests (require live API keys; deselect with '-m not integration')",
]
addopts = "-v --tb=short"

# ─────────────────────────────────────────────────────────────────
# Ruff — linting & formatting
# ─────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py311"
line-length    = 100
exclude = [
    ".git", ".venv", "venv", "__pycache__", "build", "dist",
    "reports", "*.egg-info",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "N",   # pep8-naming
]
ignore = [
    "E501",  # line-too-long (handled by formatter)
    "B008",  # function calls in default args (common in pydantic)
]

[tool.ruff.lint.isort]
known-first-party = ["tools", "eval_crew", "eval_simple", "dashboard"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

# ─────────────────────────────────────────────────────────────────
# Coverage
# ─────────────────────────────────────────────────────────────────
[tool.coverage.run]
source = ["."]
omit   = ["tests/*", "venv/*", ".venv/*", "setup.py"]

[tool.coverage.report]
show_missing   = true
skip_covered   = false
fail_under     = 70
